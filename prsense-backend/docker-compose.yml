version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=prsense_db
      - DB_USER=prsense_user
      - DB_PASS=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=thisIsASecretKeyForDevelopmentOnlyMakeSureItsLongEnough99!
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - prsense-network

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=prsense_db
      - POSTGRES_USER=prsense_user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prsense_user -d prsense_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prsense-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - prsense-network

volumes:
  postgres-data:
  redis-data:

networks:
  prsense-network:
    driver: bridge
