spring:
  application:
    name: prsense-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prsense_db}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:prsense_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASS:password}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379/0}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:veryLongSecretKeyWhichShouldBeReplacedInProductionEnvironments99!}
  expiration: 86400000 # 24 hours

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

github:
  oauth:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:http://localhost:3000/auth/github/callback}

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

allowed:
  origins: ${ALLOWED_ORIGINS:http://localhost:5173}

